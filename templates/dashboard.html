<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Picker - Dashboard</title>
    <style>
        /*Want to make an separate css file*/
        :root {
            --main-color: #bb86fc;
            --main-color-opacity: rgba(187, 134, 252, 0.1);
            --bg-dark: #0f0f0f;
            --sidebar-bg: #1a1a1a;
            --total-radio: {{ wheels|length if wheels|length > 0 else 1 }};
        }

        * { box-sizing: border-box; }
        
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            background-color: var(--bg-dark); 
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            overflow-x: hidden;
        }

        .super-wrapper {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        .sidebar {
            width: 300px;
            background-color: var(--sidebar-bg);
            padding: 30px 0;
            border-right: 1px solid #333;
            display: flex;
            flex-direction: column;
            z-index: 100;
            flex-shrink: 0;
        }

        .sidebar h2 {
            padding-left: 1.5rem;
            color: white;
            font-weight: 300;
            margin-bottom: 2rem;
            letter-spacing: 1px;
        }

        .radio-container {
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .wheel-item {
            position: relative;
            display: flex;
            align-items: center;
            height: 3.5rem;
        }

        .radio-container input {
            cursor: pointer;
            appearance: none;
            margin: 0;
            height: 100%;
            width: 85%;
            position: absolute;
            left: 0;
            z-index: 10;
            outline: none;
        }

        .radio-container label {
            cursor: pointer;
            padding-left: 2rem;
            height: 100%;
            width: 100%;
            display: flex;
            align-items: center;
            position: relative;
            color: #888;
            transition: all 0.3s ease-in-out;
            z-index: 5;
        }

        .radio-container input:checked + label {
            color: var(--main-color);
            font-weight: bold;
        }

        .btn-delete {
            color: #444;
            text-decoration: none;
            font-size: 1.4rem;
            z-index: 20;
            transition: 0.3s;
            line-height: 1;
            cursor: pointer;
        }

        .btn-delete:hover {
            color: #ff4444;
            transform: scale(1.2);
        }

        .sidebar .btn-delete {
            position: absolute;
            right: 15px;
        }

        .glider-container {
            position: absolute;
            left: 0; top: 0; bottom: 0;
            background: #333;
            width: 2px;
            z-index: 1;
        }

        .glider {
            position: relative;
            height: calc(100% / var(--total-radio));
            width: 100%;
            background: var(--main-color);
            transition: transform 0.5s cubic-bezier(0.37, 1.95, 0.66, 0.56);
            box-shadow: 0 0 15px var(--main-color);
        }

        {% for i in range(20) %}
        .radio-container .wheel-item:nth-child({{ i+1 }}):has(input:checked) ~ .glider-container .glider {
            transform: translateY({{ i * 100 }}%);
        }
        {% endfor %}

        .main-content {
            flex-grow: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: radial-gradient(circle at top right, #1a0b2e, #0f0f0f);
            overflow-y: auto;
        }

        #result-display {
            font-size: 4rem;
            color: var(--main-color);
            margin: 40px 0;
            text-shadow: 0 0 20px var(--main-color-opacity);
            min-height: 120px;
            font-weight: bold;
            text-align: center;
        }

        .btn-spin {
            background: transparent;
            border: 2px solid var(--main-color);
            color: var(--main-color);
            padding: 15px 45px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.4s;
            text-transform: uppercase;
        }

        .btn-spin:hover {
            background: var(--main-color);
            color: black;
            box-shadow: 0 0 30px var(--main-color-opacity);
        }

        .card {
            margin-top: 40px;
            width: 100%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.03);
            padding: 25px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
        }

        .items-list {
            max-height: 300px;
            overflow-y: auto;
            margin-top: 10px;
            padding-right: 5px;
        }

        .items-list::-webkit-scrollbar { width: 5px; }
        .items-list::-webkit-scrollbar-track { background: transparent; }
        .items-list::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

        .item-row {
            padding: 12px 0;
            border-bottom: 1px solid #252525;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        input[type="text"] {
            background: #252525;
            border: 1px solid #333;
            color: white;
            padding: 10px;
            border-radius: 8px;
            outline: none;
        }

        .sidebar-footer {
            margin-top: auto;
            padding: 20px;
            border-top: 1px solid #333;
        }

        .logout-link { color: #555; text-decoration: none; font-size: 0.9rem; }
        .logout-link:hover { color: var(--main-color); }
    </style>
</head>
<body>

<div class="super-wrapper">
    <aside class="sidebar">
        <h2>List Of My Wheels</h2>
        
        <div class="radio-container">
            {% for wheel in wheels %}
                <div class="wheel-item">
                    <input type="radio" name="wheel_select" id="wheel-{{ wheel.id }}" 
                           {% if active_wheel and active_wheel.id == wheel.id %}checked{% endif %}
                           onchange="window.location.href='{{ url_for('wheel_detail', wheel_id=wheel.id) }}'">
                    <label for="wheel-{{ wheel.id }}">{{ wheel.title }}</label>
                    
                    <a href="{{ url_for('remove_wheel', wheel_id=wheel.id) }}" 
                       class="btn-delete" 
                       onclick="return confirm('Delete this entire wheel?')">&times;</a>
                </div>
            {% endfor %}

            <div class="glider-container">
                <div class="glider"></div>
            </div>
        </div>

        <div style="padding: 20px 1.5rem;">
            <form action="/add_wheel" method="POST" style="display: flex; gap: 8px;">
                <input type="text" name="title" placeholder="New wheel..." required style="flex-grow: 1; font-size: 0.8rem;">
                <button type="submit" style="background: var(--main-color); border:none; border-radius: 8px; padding: 0 15px; cursor: pointer; font-weight: bold;">+</button>
            </form>
        </div>

        <div class="sidebar-footer">
            <a href="/logout" class="logout-link">Logout</a>
        </div>
    </aside>

    <main class="main-content">
        {% if active_wheel %}
            <h1 style="font-weight: 300; letter-spacing: 3px; margin-bottom: 0;">{{ active_wheel.title }}</h1>
            
            <div id="result-display">READY TO SPIN?</div>

            <button class="btn-spin" onclick="runSpinner()">Spin Now!</button>

            <div class="card">
                <h3 style="color: var(--main-color); margin-top: 0;">Options</h3>
                <form action="/add_item/{{ active_wheel.id }}" method="POST" style="display: flex; gap: 10px; margin-bottom: 25px;">
                    <input type="text" name="label" placeholder="Enter option..." required style="flex-grow: 1;">
                    <button type="submit" style="background: #333; color: white; border: none; padding: 0 20px; border-radius: 8px; cursor: pointer;">Add</button>
                </form>

                <div class="items-list">
                    {% for item in items %}
                        <div class="item-row">
                            <span><span style="color: var(--main-color); margin-right: 15px;">•</span> {{ item.label }}</span>
                            <a href="{{ url_for('remove_item', wheel_id=active_wheel.id, item_id=item.id) }}" 
                               class="btn-delete" 
                               onclick="return confirm('Remove this item?')">&times;</a>
                        </div>
                    {% endfor %}
                </div>
            </div>
        {% else %}
            <div style="margin-top: 25vh; text-align: center; opacity: 0.4;">
                <h1 style="font-size: 3rem;">SELECT A WHEEL</h1>
                <p>Choose a wheel from the sidebar to start</p>
            </div>
        {% endif %}
    </main>
</div>

<script>
    function runSpinner() {
        const display = document.getElementById('result-display');
        const items = {{ items | map(attribute='label') | list | tojson | safe if items else '[]' }};
        
        if (items.length < 2) {
            alert("Please add at least 2 items to spin!");
            return;
        }

        let ticks = 0;
        const totalTicks = 30;
        display.style.color = "white";

        const timer = setInterval(() => {
            display.innerText = items[Math.floor(Math.random() * items.length)];
            ticks++;
            if (ticks > totalTicks) {
                clearInterval(timer);
                display.innerText = items[Math.floor(Math.random() * items.length)];
                display.style.color = "var(--main-color)";
                display.animate([
                    { transform: 'scale(0.8)', opacity: 0 },
                    { transform: 'scale(1.1)', opacity: 1 },
                    { transform: 'scale(1)', opacity: 1 }
                ], { duration: 500 });
            }
        }, 60);
    }
</script>

</body>
</html>
